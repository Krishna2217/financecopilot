name: Deploy

# Runs after Backend CI / Frontend CI succeed on main. Builds the backend image, pushes it to
# Azure Container Registry, rolls it out to App Service, then builds and deploys the frontend
# to Azure Static Web Apps.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   AZURE_CREDENTIALS                 - `az ad sp create-for-rbac --sdk-auth` JSON output for a
#                                        service principal scoped to the resource group
#   ACR_NAME                          - Azure Container Registry name (without .azurecr.io)
#   AZURE_WEBAPP_NAME                 - App Service name running the backend container
#   AZURE_RESOURCE_GROUP              - resource group containing the App Service
#   AZURE_STATIC_WEB_APPS_API_TOKEN   - deployment token from the Static Web Apps resource
#
# Until these secrets exist, this workflow's jobs will fail at the `azure/login` /
# `Azure/static-web-apps-deploy` steps — that is expected on a repo with no Azure resources
# provisioned yet. Backend CI and Frontend CI (separate workflows) do not depend on this and
# stay green regardless.

on:
  workflow_run:
    workflows: ["Backend CI", "Frontend CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy-backend:
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push image
        run: |
          IMAGE="${{ secrets.ACR_NAME }}.azurecr.io/financecopilot:${{ github.sha }}"
          docker build -t "$IMAGE" -t "${{ secrets.ACR_NAME }}.azurecr.io/financecopilot:latest" .
          docker push "$IMAGE"
          docker push "${{ secrets.ACR_NAME }}.azurecr.io/financecopilot:latest"

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          resource-group-name: ${{ secrets.AZURE_RESOURCE_GROUP }}
          images: ${{ secrets.ACR_NAME }}.azurecr.io/financecopilot:${{ github.sha }}

  deploy-frontend:
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci && build
        run: |
          npm ci
          npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist
          skip_app_build: true
