name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pom.xml"
      - "mvnw"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "pom.xml"
      - "mvnw"
      - ".github/workflows/backend-ci.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # mvn verify runs the JUnit/Mockito suite, the Testcontainers-backed repository and
      # RAG ingestion tests (ubuntu-latest ships Docker, which Testcontainers needs), JaCoCo's
      # >=75% service-package coverage gate, and Spotless formatting check.
      - name: mvn verify
        run: ./mvnw -B verify

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14
