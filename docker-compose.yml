services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: financecopilot
      POSTGRES_USER: ${DB_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${DB_SUPERUSER_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - financecopilot-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_SUPERUSER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: jdbc:postgresql://db:5432/financecopilot
      # App runtime datasource: least-privilege finance_app role (created by Flyway below).
      DB_APP_USERNAME: ${DB_APP_USERNAME:-finance_app}
      DB_APP_PASSWORD: ${DB_APP_PASSWORD:-changeme}
      DB_RO_PASSWORD: ${DB_RO_PASSWORD:-changeme}
      # Flyway migration datasource: elevated (superuser) credentials, since migrations
      # create the finance_ro/finance_app roles themselves.
      DB_SUPERUSER: ${DB_SUPERUSER:-postgres}
      DB_SUPERUSER_PASSWORD: ${DB_SUPERUSER_PASSWORD:-postgres}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      APPLICATIONINSIGHTS_CONNECTION_STRING: ${APPLICATIONINSIGHTS_CONNECTION_STRING:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  financecopilot-db-data:
