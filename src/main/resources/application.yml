spring:
  application:
    name: financecopilot
  profiles:
    active: local
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    placeholders:
      financeRoPassword: ${DB_RO_PASSWORD:changeme}
      financeAppPassword: ${DB_APP_PASSWORD:changeme}

server:
  port: 8080

app:
  sql-safety:
    datasource-url: ${DB_URL:jdbc:postgresql://localhost:5432/financecopilot}
    username: ${DB_RO_USERNAME:finance_ro}
    password: ${DB_RO_PASSWORD:changeme}
    max-limit: 1000
    statement-timeout: 5s
    allowed-schema: analytics
  ai:
    nl2sql:
      deployment-name: ${AZURE_OPENAI_CHAT_DEPLOYMENT:gpt-4o}
      temperature: 0.0
    anomaly:
      deployment-name: ${AZURE_OPENAI_CHAT_DEPLOYMENT:gpt-4o}
      temperature: 0.2
    report:
      deployment-name: ${AZURE_OPENAI_CHAT_DEPLOYMENT:gpt-4o}
      temperature: 0.3

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    level: "%5p [traceId=%X{traceId} requestId=%X{requestId}]"

---
spring:
  config:
    activate:
      on-profile: local
  # No Azure OpenAI credentials are required to boot locally in Phase 0.
  # ChatClient beans are wired in Phase 2 once credentials are available.
  autoconfigure:
    exclude:
      - org.springframework.ai.model.azure.openai.autoconfigure.AzureOpenAiChatAutoConfiguration
      - org.springframework.ai.model.azure.openai.autoconfigure.AzureOpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.azure.openai.autoconfigure.AzureOpenAiImageAutoConfiguration
      - org.springframework.ai.model.azure.openai.autoconfigure.AzureOpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/financecopilot}
    username: ${DB_APP_USERNAME:finance_app}
    password: ${DB_APP_PASSWORD:changeme}
  flyway:
    # Migrations create the finance_ro/finance_app roles themselves, so they need
    # elevated (superuser) credentials distinct from the app's own runtime datasource.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/financecopilot}
    user: ${DB_SUPERUSER:postgres}
    password: ${DB_SUPERUSER_PASSWORD:postgres}
  ai:
    vectorstore:
      pgvector:
        initialize-schema: true

app:
  ai:
    # No ChatModel bean exists locally without Azure/OpenAI credentials (see the
    # autoconfiguration exclusions above); ChatClientConfig is gated by this flag.
    enabled: false

logging:
  level:
    com.microsoft.financecopilot: DEBUG

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${DB_URL}
    username: ${DB_APP_USERNAME}
    password: ${DB_APP_PASSWORD}
  flyway:
    url: ${DB_URL}
    user: ${DB_SUPERUSER}
    password: ${DB_SUPERUSER_PASSWORD}
  ai:
    azure:
      openai:
        endpoint: ${AZURE_OPENAI_ENDPOINT}
        api-key: ${AZURE_OPENAI_API_KEY}
    vectorstore:
      pgvector:
        initialize-schema: true

app:
  sql-safety:
    datasource-url: ${DB_URL}

logging:
  level:
    com.microsoft.financecopilot: INFO

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_APP_USERNAME}
    password: ${DB_APP_PASSWORD}
  flyway:
    url: ${DB_URL}
    user: ${DB_SUPERUSER}
    password: ${DB_SUPERUSER_PASSWORD}
  ai:
    azure:
      openai:
        endpoint: ${AZURE_OPENAI_ENDPOINT}
        api-key: ${AZURE_OPENAI_API_KEY}
    vectorstore:
      pgvector:
        initialize-schema: false

app:
  sql-safety:
    datasource-url: ${DB_URL}

management:
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.microsoft.financecopilot: WARN
